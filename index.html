<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AuditFlow Pro</title>

<link rel="stylesheet" href="styles.css?v=7.0">
<link rel="manifest" href="manifest.json?v=7.0">

<meta name="theme-color" content="#0f172a">

</head>

<body>

<header class="header">

<div class="header-inner">

<div class="brand">
AuditFlow Pro
<span class="subtitle">Institutional Exposure Determination Instrument</span>
</div>

<div class="version">
Instrument Version v7.0
</div>

</div>

<div class="gold-bar"></div>

</header>

<main class="container">

<section class="panel">

<h1>Audit Registration</h1>

<label>Consultant</label>
<input id="consultant">

<label>Organisation</label>
<input id="organisation">

<label>Client / Site</label>
<input id="clientSite">

<label>Audit Title</label>
<input id="auditTitle">

<label>Assessment Date</label>
<input type="date" id="assessmentDate">

<button id="registerAudit" class="primary">
Register Instrument
</button>

<button id="auditRecords" class="secondary">
Audit Records
</button>

</section>


<section class="panel hidden" id="findingsPanel">

<h2>Evidence Findings</h2>

<label>Finding</label>
<input id="findingText">

<label>Location</label>
<input id="findingLocation">

<label>Severity</label>

<select id="findingSeverity">

<option>Critical</option>
<option>High</option>
<option>Moderate</option>
<option>Low</option>

</select>

<button id="addFinding" class="primary">
Add Finding
</button>

<div id="findingList"></div>

<button id="generateActions" class="secondary">
Generate Corrective Actions
</button>

</section>


<section class="panel hidden" id="actionsPanel">

<h2>Corrective Actions</h2>

<div id="actionList"></div>

<button id="exportJSON" class="primary">
Export Automation JSON
</button>

</section>

</main>

<footer>

© AuditFlow Pro — Professional Audit Instrument System

</footer>

<script src="app.js?v=7.0"></script>

<script>

if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('./service-worker.js?v=7.0')

}

</script>

</body>
</html>
