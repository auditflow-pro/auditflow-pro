<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuditFlow Pro — Exposure Determination Instrument</title>

<link rel="stylesheet" href="styles.css?v=6001">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2a33">
</head>

<body>

<header class="app-header no-print">
  <div class="brand-title">AuditFlow Pro</div>
  <div class="brand-sub">Professional Exposure Determination Instrument</div>
  <div class="gold-bar"></div>
</header>

<main class="container">

<section id="registration" class="panel">
  <h2>Audit Registration</h2>

  <label>Consultant Name</label>
  <input id="consultantName" type="text">

  <label>Organisation</label>
  <input id="orgName" type="text">

  <label>Client</label>
  <input id="clientName" type="text">

  <label>Audit Title</label>
  <input id="auditTitle" type="text">

  <label>Assessment Date</label>
  <input id="assessmentDate" type="date">

  <button id="startAudit" class="btn-primary">Commence Assessment</button>
</section>

<section id="assessment" class="panel hidden">
  <h2>Structured Exposure Assessment</h2>
  <div id="questionsContainer"></div>

  <div class="nav-row">
    <button id="backToRegistration" class="btn-secondary">Back</button>
    <button id="completeAudit" class="btn-primary">Proceed to Determination</button>
  </div>
</section>

<section id="determination" class="panel hidden">
  <h2>Exposure Analysis</h2>
  <div id="analysisPreview"></div>

  <div class="nav-row">
    <button id="backToAssessment" class="btn-secondary">Back</button>
    <button id="sealAudit" class="btn-primary">Seal & Generate Report</button>
  </div>
</section>

<section id="record" class="panel hidden">
  <div id="recordContent"></div>
  <button id="exportPDF" class="btn-primary no-print">
    Export Professional Report (PDF)
  </button>
</section>

</main>

<script src="app.js?v=6001"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
