<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditFlow Pro</title>

  <link rel="manifest" href="manifest.json?v=1.0">
  <link rel="stylesheet" href="styles.css?v=1.0">

  <meta name="theme-color" content="#162235" />
</head>

<body>

<header class="app-header">
  <div class="header-inner">
    <div class="brand">
      <h1>AuditFlow Pro</h1>
      <p>Institutional Exposure Determination Instrument</p>
    </div>
  </div>
  <div class="gold-band"></div>
</header>

<main class="instrument-frame">

  <section class="panel">
    <div class="version">Version v1.0 — Foundation Reset</div>

    <h2>Audit Registration</h2>

    <div class="field">
      <label for="consultant">Consultant Name</label>
      <input id="consultant" type="text" autocomplete="off">
    </div>

    <div class="field">
      <label for="organisation">Organisation</label>
      <input id="organisation" type="text" autocomplete="off">
    </div>

    <div class="field">
      <label for="client">Client / Site</label>
      <input id="client" type="text" autocomplete="off">
    </div>

    <div class="field">
      <label for="title">Audit Title</label>
      <input id="title" type="text" autocomplete="off">
    </div>

    <div class="field">
      <label for="date">Assessment Date</label>
      <input id="date" type="date">
    </div>

    <div class="actions">
      <button class="btn-primary">Begin Audit</button>
    </div>

  </section>

</main>

<footer class="app-footer">
  <div class="footer-inner">
    <span>© AuditFlow Pro</span>
    <span>All Rights Reserved</span>
    <span>Offline Instrument</span>
  </div>
</footer>

<script src="app.js?v=1.0"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js?v=1.0');
  });
}
</script>

</body>
</html>
