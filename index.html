<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AuditFlow Pro</title>

<link rel="stylesheet" href="styles.css?v=11.0-stable">
<link rel="manifest" href="manifest.json?v=11.0-stable">

<meta name="theme-color" content="#0f172a">

</head>

<body>

<header class="topbar">

<div class="topbar-inner">

<div class="brand">
AuditFlow Pro
<span>Exposure Determination Instrument</span>
</div>

<div class="version">
v11.0
</div>

</div>

</header>

<main class="workspace">

<div class="instrument">

<div class="instrument-header">

<h1>Audit Registration</h1>

<div class="steps">

<span class="step active">Registration</span>
<span class="step">Assessment</span>
<span class="step">Determination</span>
<span class="step">Report</span>

</div>

</div>

<div class="instrument-body">

<label>Consultant</label>
<input id="consultant">

<label>Organisation</label>
<input id="organisation">

<label>Client / Site</label>
<input id="clientSite">

<label>Audit Title</label>
<input id="auditTitle">

<label>Assessment Date</label>
<input id="assessmentDate" type="date">

<button id="startAudit" class="primary">
Initiate Audit
</button>

</div>

</div>

</main>

<footer>

© AuditFlow Pro

</footer>

<script src="app.js?v=11.0-stable"></script>

<script>

if('serviceWorker' in navigator){
navigator.serviceWorker.register('./service-worker.js?v=11.0-stable')
}

</script>

</body>
</html>
