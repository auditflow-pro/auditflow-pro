<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AuditFlow Pro</title>

<link rel="stylesheet" href="styles.css?v=7.6">
<link rel="manifest" href="manifest.json?v=7.6">

<meta name="theme-color" content="#0f172a">

</head>

<body>

<header class="header">

<div class="header-inner">

<div class="brand">
AuditFlow Pro
<span class="subtitle">Institutional Exposure Determination Instrument</span>
</div>

<div class="version">
Instrument Version v7.6
</div>

</div>

<div class="gold-bar"></div>

</header>

<main class="container">

<section class="panel">

<h1>Audit Registration</h1>

<label>Consultant</label>
<input id="consultant" type="text">

<label>Organisation</label>
<input id="organisation" type="text">

<label>Client / Site</label>
<input id="clientSite" type="text">

<label>Audit Title</label>
<input id="auditTitle" type="text">

<label for="assessmentDate">Assessment Date</label>
<input type="date" id="assessmentDate">

<button id="registerAudit" class="primary">
Register Audit
</button>

<button id="auditRecords" class="secondary">
Audit Records
</button>

</section>

</main>

<footer>
© AuditFlow Pro — Professional Audit Instrument System
</footer>

<script src="app.js?v=7.6"></script>

<script>
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('./service-worker.js?v=7.6');
});
}
</script>

</body>
</html>
