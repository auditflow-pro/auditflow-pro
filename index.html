<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuditFlow Pro — Exposure Determination Instrument</title>
<link rel="stylesheet" href="styles.css?v=1300">
</head>

<body>

<header class="app-header">
    <div class="header-inner">
        <div class="brand">
            <div class="brand-title">AuditFlow Pro</div>
            <div class="brand-sub">Exposure Determination Instrument</div>
        </div>
        <div class="version">
            Instrument Version v1.0
        </div>
    </div>
    <div class="gold-band"></div>
</header>

<main>

<section id="registrationPanel" class="panel">
    <h2>Audit Registration</h2>

    <div id="registrationError" class="validation hidden"></div>

    <div class="field">
        <label>Consultant Name</label>
        <input id="consultantName" type="text" autocomplete="off">
    </div>

    <div class="field">
        <label>Client Name</label>
        <input id="clientName" type="text" autocomplete="off">
    </div>

    <div class="field">
        <label>Audit Title</label>
        <input id="auditTitle" type="text" autocomplete="off">
    </div>

    <div class="field">
        <label>Assessment Date</label>
        <input id="assessmentDate" type="date">
    </div>

    <button id="startBtn" class="primary-btn">Initiate Assessment</button>
</section>

<section id="assessmentSection" class="hidden">
    <div id="domainsContainer"></div>

    <div id="globalExposure" class="exposure-block hidden"></div>

    <button id="sealBtn" class="primary-btn">Seal Assessment</button>
</section>

<section id="documentSection" class="hidden document-mode">
    <div id="documentContent"></div>

    <div class="record-actions">
        <h3>Record Actions</h3>
        <button id="exportBtn" class="primary-btn">Export / Issue Record</button>

        <div id="exportOptions" class="export-options hidden">
            <button id="printBtn">Print / Save as PDF</button>
            <button id="cancelExportBtn">Cancel</button>
        </div>
    </div>
</section>

</main>

<footer>
    © AuditFlow Pro — Professional Instrument System
</footer>

<script src="app.js?v=1300"></script>
</body>
</html>
