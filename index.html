<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AuditFlow Pro</title>

<link rel="manifest" href="manifest.json?v=7.0">
<link rel="stylesheet" href="styles.css?v=7.0">

<meta name="theme-color" content="#0b1f33">

</head>


<body>

<header class="app-header">

<div class="header-inner">

<h1>AuditFlow Pro</h1>

<p class="subtitle">
Structured Audit & Compliance Instrument
</p>

<p class="edition">
Professional Edition · Global Model
</p>

</div>

<div class="header-divider"></div>

</header>


<nav class="workflow-nav">

<a class="active">Registration</a>
<a>Audit</a>
<a>Outcome</a>
<a>Summary</a>
<a>Report / Export</a>

</nav>


<main class="container">

<section class="card">

<h2>Audit Registration</h2>

<label>Consultant</label>
<input id="consultant" type="text" placeholder="Consultant name">

<label>Organisation</label>
<input id="organisation" type="text" placeholder="Organisation">

<label>Client / Site</label>
<input id="client" type="text" placeholder="Client or site name">

<label>Audit Title</label>
<input id="title" type="text" placeholder="Audit title">

<label>Assessment Date</label>
<input id="date" type="date">

<button id="beginAudit">Begin Audit</button>

</section>

<section class="card">

<h2>Audit Records</h2>

<div id="ledger"></div>

</section>

</main>


<footer class="app-footer">

<p>© AuditFlow Pro</p>
<p>Structured Audit Instrument</p>

</footer>


<script src="app.js?v=7.0"></script>


<script>

if ('serviceWorker' in navigator) {

window.addEventListener('load', () => {

navigator.serviceWorker.register('service-worker.js?v=7.0');

});

}

</script>


</body>

</html>
