<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditFlow Pro</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />

  <meta name="theme-color" content="#0f2747" />
</head>
<body>

<header class="app-header">
  <h1>AuditFlow Pro</h1>
  <p>Institutional Exposure Determination Instrument</p>
</header>

<main class="container">

  <section class="card">
    <p class="version">Version: v3.3 Production Stable</p>
    <h2>Audit Registration</h2>

    <label>Consultant Name</label>
    <input id="consultant" type="text" />

    <label>Organisation</label>
    <input id="organisation" type="text" />

    <label>Client / Site Name</label>
    <input id="client" type="text" />

    <label>Audit Title</label>
    <input id="title" type="text" />

    <label>Assessment Date</label>
    <input id="date" type="date" />

    <button id="saveBtn" class="primary">Save & Continue</button>
    <button id="resetBtn" class="secondary">Start New Audit</button>
  </section>

  <section class="card">
    <h2>Audit Ledger</h2>
    <div id="ledger"></div>
  </section>

</main>

<div id="toast" class="toast"></div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated') {
            window.location.reload();
          }
        });
      });
    });
}
</script>

</body>
</html>
