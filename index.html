<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AuditFlow Pro — Institutional Exposure Determination Instrument</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f1c2e" />
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="app-header">
    <div class="header-inner">
        <h1>AuditFlow Pro</h1>
        <p>Institutional Exposure Determination Instrument</p>
    </div>
</header>

<main class="app-main">

<section class="card">

    <div class="version-block">
        Version: v3.0 Global Institutional Baseline
    </div>

    <h2>Audit Registration</h2>

    <form id="registration-form" autocomplete="off" novalidate>

        <div class="form-group">
            <label for="consultant">Consultant Name</label>
            <input class="input-field" id="consultant" type="text" />
        </div>

        <div class="form-group">
            <label for="organisation">Organisation</label>
            <input class="input-field" id="organisation" type="text" />
        </div>

        <div class="form-group">
            <label for="client">Client / Site Name</label>
            <input class="input-field" id="client" type="text" />
        </div>

        <div class="form-group">
            <label for="auditTitle">Audit Title</label>
            <input class="input-field" id="auditTitle" type="text" />
        </div>

        <div class="form-group">
            <label for="assessmentDate">Assessment Date</label>
            <input class="input-field" id="assessmentDate" type="date" />
        </div>

        <button type="button" id="saveAuditBtn" class="primary-button">
            Save & Continue
        </button>

        <button type="button" id="newAuditBtn" class="secondary-button">
            Start New Audit
        </button>

    </form>

</section>

<section class="card ledger-card">

    <h3>Audit Ledger</h3>
    <div id="ledgerList"></div>

</section>

</main>

<script src="app.js"></script>
</body>
</html>
