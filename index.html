<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditFlow Pro</title>

  <link rel="manifest" href="manifest.json?v=3.5">
  <link rel="stylesheet" href="styles.css?v=3.5">

  <meta name="theme-color" content="#1f3558" />
</head>
<body>

<header class="hero">
  <h1>AuditFlow Pro</h1>
  <p>Institutional Exposure Determination Instrument</p>
</header>

<main class="container">

  <section class="card">
    <div class="version">Version: v3.5 Production Stable</div>

    <h2>Audit Registration</h2>

    <label>Consultant Name</label>
    <input id="consultant" type="text" value="Dan Hadfield" />

    <label>Organisation</label>
    <input id="organisation" type="text" />

    <label>Client / Site Name</label>
    <input id="client" type="text" />

    <label>Audit Title</label>
    <input id="title" type="text" />

    <label>Assessment Date</label>
    <input id="date" type="date" />

    <button id="saveBtn" class="primary">Save & Continue</button>
    <button id="resetBtn" class="secondary">Start New Audit</button>
  </section>

  <section class="card">
    <h2>Audit Ledger</h2>
    <div id="ledger"></div>
  </section>

</main>

<!-- Professional Internal Confirmation Modal -->
<div id="confirmModal" class="modal hidden">
  <div class="modal-content">
    <h3>Delete Audit</h3>
    <p>This audit will be permanently removed from this device.</p>
    <div class="modal-actions">
      <button id="cancelDelete" class="secondary">Cancel</button>
      <button id="confirmDelete" class="danger">Delete Permanently</button>
    </div>
  </div>
</div>

<script src="app.js?v=3.5"></script>

</body>
</html>
