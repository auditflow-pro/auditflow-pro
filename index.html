<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AuditFlow Pro</title>

<link rel="manifest" href="manifest.json?v=7">
<link rel="stylesheet" href="styles.css?v=7">

<meta name="theme-color" content="#0f172a">

</head>

<body>

<header class="app-header">
<h1>AuditFlow Pro</h1>
<p>Institutional Exposure Determination Instrument</p>
</header>

<main class="container">

<form id="audit-registration">

<label>Consultant</label>
<input type="text" id="consultant">

<label>Organisation</label>
<input type="text" id="organisation">

<label>Client / Site</label>
<input type="text" id="client">

<label>Audit Title</label>
<input type="text" id="auditTitle">

<label>Assessment Date</label>
<input type="date" id="assessmentDate">

<button type="button" onclick="startAudit()">
Register Instrument
</button>

</form>

<button onclick="viewRecords()" class="secondary">
Audit Records
</button>

</main>

<script src="app.js?v=7"></script>

</body>
</html>
