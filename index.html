<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AuditFlow Pro</title>

<link rel="stylesheet" href="styles.css?v=10.0">
<link rel="manifest" href="manifest.json?v=10.0">

<meta name="theme-color" content="#0f172a">

</head>

<body>

<header class="header">

<div class="header-inner">

<div class="brand">
AuditFlow Pro
<span class="subtitle">Institutional Exposure Determination Instrument</span>
</div>

<div class="version">
Instrument Version v10.0
</div>

</div>

<div class="gold-bar"></div>

</header>

<main class="container">

<section class="panel">

<h1>Audit Registration</h1>

<label>Consultant</label>
<input id="consultant">

<label>Organisation</label>
<input id="organisation">

<label>Client / Site</label>
<input id="clientSite">

<label>Audit Title</label>
<input id="auditTitle">

<label>Assessment Date</label>
<input type="date" id="assessmentDate">

<button id="registerAudit" class="primary">
Initiate Audit
</button>

</section>

</main>

<footer>
© AuditFlow Pro
</footer>

<script src="app.js?v=10.0"></script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./service-worker.js?v=10.0")
}
</script>

</body>
</html>
