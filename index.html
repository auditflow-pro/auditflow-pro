<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditFlow Pro</title>

  <!-- Version synchronisation -->
  <link rel="manifest" href="manifest.json?v=3.6">
  <link rel="stylesheet" href="styles.css?v=3.6">

  <meta name="theme-color" content="#1f3558" />
</head>

<body>

<header class="hero">
  <h1>AuditFlow Pro</h1>
  <p>Institutional Exposure Determination Instrument</p>
</header>

<main class="container">

  <!-- REGISTRATION CARD -->
  <section class="card">
    <div class="version">Version: v3.6 Production Stable</div>

    <h2>Audit Registration</h2>

    <label for="consultant">Consultant Name</label>
    <input id="consultant" type="text" value="Dan Hadfield" autocomplete="off" />

    <label for="organisation">Organisation</label>
    <input id="organisation" type="text" autocomplete="off" />

    <label for="client">Client / Site Name</label>
    <input id="client" type="text" autocomplete="off" />

    <label for="title">Audit Title</label>
    <input id="title" type="text" autocomplete="off" />

    <label for="date">Assessment Date</label>
    <input id="date" type="date" />

    <button id="saveBtn" class="primary">Save & Continue</button>
    <button id="resetBtn" class="secondary">Start New Audit</button>
  </section>

  <!-- LEDGER CARD -->
  <section class="card">
    <h2>Audit Ledger</h2>
    <div id="ledger"></div>
  </section>

</main>

<!-- CONFIRMATION MODAL -->
<div id="confirmModal" class="modal hidden">
  <div class="modal-content">
    <h3>Delete Audit</h3>
    <p>This audit will be permanently removed from this device.</p>
    <div class="modal-actions">
      <button id="cancelDelete" class="secondary">Cancel</button>
      <button id="confirmDelete" class="danger">Delete Permanently</button>
    </div>
  </div>
</div>

<!-- APPLICATION SCRIPT -->
<script src="app.js?v=3.6"></script>

<!-- SERVICE WORKER REGISTRATION (PROJECT-SITE SAFE) -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {

    navigator.serviceWorker.register('/auditflow-pro/service-worker.js?v=3.6', {
      scope: '/auditflow-pro/'
    })
    .then(registration => {
      registration.update();
    })
    .catch(error => {
      console.error('Service Worker registration failed:', error);
    });

  });
}
</script>

</body>
</html>
