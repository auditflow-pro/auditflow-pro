<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Assessment</title>

<link rel="stylesheet" href="styles.css?v=11.0">

</head>

<body>

<header class="topbar">

<div class="topbar-inner">

<div class="brand">
AuditFlow Pro
<span>Exposure Determination Instrument</span>
</div>

<div class="version">
v11.0
</div>

</div>

</header>

<main class="workspace">

<div class="instrument">

<div class="instrument-header">

<h1>Exposure Assessment</h1>

<div class="steps">

<span class="step">Registration</span>
<span class="step active">Assessment</span>
<span class="step">Determination</span>
<span class="step">Report</span>

</div>

</div>

<div class="instrument-body">

<div class="question">

<p>Fire detection system operational?</p>

<div class="button-row">
<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>
</div>

</div>

<div class="question">

<p>Emergency exits unobstructed?</p>

<div class="button-row">
<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>
</div>

</div>

<div class="question">

<p>Electrical systems maintained?</p>

<div class="button-row">
<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>
</div>

</div>

<div class="question">

<p>Housekeeping standards acceptable?</p>

<div class="button-row">
<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>
</div>

</div>

<button id="determineExposure" class="primary">
Proceed to Determination
</button>

</div>

</div>

</main>

<script src="app.js?v=11.0"></script>

</body>
</html>
