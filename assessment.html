<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Exposure Assessment</title>

<link rel="stylesheet" href="styles.css?v=10.0">

</head>

<body>

<header class="header">

<div class="brand">

AuditFlow Pro

<span>Exposure Assessment</span>

</div>

</header>

<main class="container">

<section class="panel">

<h1>Structured Exposure Assessment</h1>

<div class="question">

<p>Fire detection system operational?</p>

<div class="button-row">

<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>

</div>

</div>

<div class="question">

<p>Emergency exits unobstructed?</p>

<div class="button-row">

<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>

</div>

</div>

<div class="question">

<p>Electrical systems maintained?</p>

<div class="button-row">

<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>

</div>

</div>

<div class="question">

<p>Housekeeping standards acceptable?</p>

<div class="button-row">

<button class="yes">YES</button>
<button class="no">NO</button>
<button class="na">N/A</button>

</div>

</div>

<button id="determineExposure" class="primary">

Proceed to Determination

</button>

</section>

</main>

<script src="app.js?v=10.0"></script>

</body>

</html>
